name = "gomr-vis"
main = "src/worker.ts"
compatibility_date = "2024-12-01"

[assets]
directory = "./client/dist"
binding = "ASSETS"
html_handling = "none"
not_found_handling = "none"

[[kv_namespaces]]
binding = "GOMR_VIS"
id = "PLACEHOLDER_KV_ID"

[durable_objects]
bindings = [
  { name = "JOB_STATUS", class_name = "JobStatus" }
]

[[migrations]]
tag = "v1"
new_classes = ["JobStatus"]
