name = "gomr-vis"
compatibility_date = "2024-12-01"
pages_build_output_dir = "client/dist"

# Cold storage for final status of destroyed DOs
[[kv_namespaces]]
binding = "JOB_ARCHIVE"
id = "PLACEHOLDER_KV_ARCHIVE_ID"

# Legacy KV namespace — kept for dual-write during migration
[[kv_namespaces]]
binding = "GOMR_VIS"
id = "PLACEHOLDER_KV_ID"

[durable_objects]
bindings = [
  { name = "JOB_STATUS", class_name = "JobStatus" }
]

[[migrations]]
tag = "v1"
new_classes = ["JobStatus"]
